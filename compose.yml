services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-leagueofbuilds}-backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 8080

    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ${APP_NAME:-leagueofbuilds}-frontend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${HOST_PORT}:80"

    depends_on:
      - backend