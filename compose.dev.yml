services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - type: bind
        source: ./frontend
        target: /app
      - type: volume
        source: frontend_node_modules
        target: /app/node_modules
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
  backend:
    build: ./backend
    command: node --watch index.js
    volumes:
      - type: bind
        source: ./backend
        target: /app
    ports:
      - "8080:8080"

volumes:
  frontend_node_modules:
