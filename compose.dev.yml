services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=mongo://db:27017
  database:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - db-data:/data/db

volumes:
  db-data:
